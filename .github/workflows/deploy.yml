name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Triggers on push to main or master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Disabled npm Cache Setup because dependencies lock file is not found in workspace
          cache: '' 

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js Static Export
        env:
          GITHUB_ACTIONS: "true"
        run: npm run build

      - name: Relativize Next.js Asset Paths for GitHub Pages
        run: node scripts/relativize.js

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages # Deploys static build folder to gh-pages branch
          clean: true
